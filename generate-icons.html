<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c192" width="192" height="192"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    const cx = s / 2, cy = s / 2;

    // Background
    ctx.fillStyle = '#0a0a0f';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.18);
    ctx.fill();

    // Outer ring gradient
    const grad = ctx.createLinearGradient(s * 0.15, s * 0.15, s * 0.85, s * 0.85);
    grad.addColorStop(0, '#8b5cf6');
    grad.addColorStop(1, '#06b6d4');

    // Clock circle
    ctx.beginPath();
    ctx.arc(cx, cy, s * 0.34, 0, Math.PI * 2);
    ctx.strokeStyle = grad;
    ctx.lineWidth = s * 0.04;
    ctx.stroke();

    // Clock hands
    ctx.beginPath();
    ctx.moveTo(cx, cy - s * 0.02);
    ctx.lineTo(cx, cy - s * 0.22);
    ctx.strokeStyle = '#8b5cf6';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + s * 0.02, cy);
    ctx.lineTo(cx + s * 0.14, cy + s * 0.1);
    ctx.strokeStyle = '#06b6d4';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, s * 0.03, 0, Math.PI * 2);
    ctx.fillStyle = '#8b5cf6';
    ctx.fill();
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));

// Download links
const a512 = document.createElement('a');
a512.href = document.getElementById('c512').toDataURL('image/png');
a512.download = 'icon-512.png';
a512.textContent = 'Download 512';
a512.click();

setTimeout(() => {
    const a192 = document.createElement('a');
    a192.href = document.getElementById('c192').toDataURL('image/png');
    a192.download = 'icon-192.png';
    a192.textContent = 'Download 192';
    a192.click();
}, 500);
</script>
</body>
</html>
